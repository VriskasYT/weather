<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherYou — Погода</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded" rel="stylesheet">
    <style>
        :root {
            --md-primary: #4a6741;
            --md-on-primary: #ffffff;
            --md-primary-container: #cbefbc;
            --md-on-primary-container: #082100;
            --md-secondary: #54634d;
            --md-secondary-container: #d7e8cd;
            --md-on-secondary-container: #121f0b;
            --md-tertiary: #386568;
            --md-tertiary-container: #bcebee;
            --md-on-tertiary-container: #002022;
            --md-surface: #f8faf0;
            --md-surface-dim: #d8dace;
            --md-surface-variant: #dfe4d7;
            --md-on-surface: #1a1c18;
            --md-on-surface-variant: #43483e;
            --md-outline: #73796d;
            --md-outline-variant: #c3c8bb;
            --md-surface-1: #eef1e6;
            --md-surface-2: #e8ece0;
            --md-surface-3: #e2e6da;
            --md-surface-4: #dce1d4;
            --md-surface-5: #d8ddcf;
            --md-error: #ba1a1a;
            --md-error-container: #ffdad6;
            --md-on-error-container: #410002;
            --md-shadow: rgba(0,0,0,0.12);
            --md-shadow-lg: rgba(0,0,0,0.18);
            --md-ripple: rgba(0,0,0,0.08);
            --radius-xs: 8px;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 28px;
            --radius-xl: 32px;
        }

        .dark {
            --md-primary: #b0d3a2;
            --md-on-primary: #1d3712;
            --md-primary-container: #334e2a;
            --md-on-primary-container: #cbefbc;
            --md-secondary: #bccbb2;
            --md-secondary-container: #3c4b37;
            --md-on-secondary-container: #d7e8cd;
            --md-tertiary: #a0cfd2;
            --md-tertiary-container: #1e4d50;
            --md-on-tertiary-container: #bcebee;
            --md-surface: #111411;
            --md-surface-dim: #111411;
            --md-surface-variant: #43483e;
            --md-on-surface: #e2e3db;
            --md-on-surface-variant: #c3c8bb;
            --md-outline: #8d9387;
            --md-outline-variant: #43483e;
            --md-surface-1: #1a1e19;
            --md-surface-2: #1f231d;
            --md-surface-3: #252924;
            --md-surface-4: #2a2e28;
            --md-surface-5: #2f332d;
            --md-error: #ffb4ab;
            --md-error-container: #93000a;
            --md-on-error-container: #ffdad6;
            --md-shadow: rgba(0,0,0,0.35);
            --md-shadow-lg: rgba(0,0,0,0.5);
            --md-ripple: rgba(255,255,255,0.1);
        }

        /* ===== GLOBAL RESET: kill blue outlines & tap highlights ===== */
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        *:focus { outline: none; }
        *:focus-visible {
            outline: 2px solid var(--md-primary);
            outline-offset: 2px;
            border-radius: 4px;
        }
        button, a, input, [role="button"] {
            outline: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        button:focus, a:focus, input:focus {
            outline: none;
            box-shadow: none;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--md-surface);
            color: var(--md-on-surface);
            min-height: 100vh;
            transition: background 0.5s ease, color 0.5s ease;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
            user-select: none;
        }

        /* ===== RIPPLE EFFECT ===== */
        .ripple-host {
            position: relative;
            overflow: hidden;
        }
        .ripple-host::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: var(--md-ripple);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: width 0.5s ease, height 0.5s ease, opacity 0.4s ease;
            pointer-events: none;
            z-index: 1;
        }
        .ripple-host:active::after {
            width: 300px; height: 300px;
            opacity: 1;
            transition: width 0s, height 0s, opacity 0s;
        }

        /* ===== SCROLL-REVEAL ANIMATION ===== */
        .reveal {
            opacity: 0;
            transform: translateY(24px) scale(0.98);
            transition: opacity 0.6s cubic-bezier(0.2, 0, 0, 1),
                        transform 0.6s cubic-bezier(0.2, 0, 0, 1);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .reveal.d1 { transition-delay: 0.05s; }
        .reveal.d2 { transition-delay: 0.1s; }
        .reveal.d3 { transition-delay: 0.15s; }
        .reveal.d4 { transition-delay: 0.2s; }
        .reveal.d5 { transition-delay: 0.25s; }
        .reveal.d6 { transition-delay: 0.3s; }
        .reveal.d7 { transition-delay: 0.35s; }

        /* ===== TOP BAR ===== */
        .top-bar {
            position: sticky; top: 0; z-index: 100;
            background: var(--md-surface-2);
            padding: 8px 12px;
            display: flex; align-items: center; gap: 8px;
            height: 64px;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--md-outline-variant);
            transition: all 0.3s;
        }

        .logo {
            display: flex; align-items: center; gap: 6px;
            font-size: 20px; font-weight: 800;
            color: var(--md-primary); letter-spacing: -0.5px; white-space: nowrap;
            transition: transform 0.2s;
        }
        .logo:active { transform: scale(0.95); }
        .logo .material-symbols-rounded { font-size: 30px; }

        .search-bar {
            flex: 1; max-width: 560px; margin: 0 auto; position: relative;
        }
        .search-bar input {
            width: 100%; padding: 10px 44px 10px 44px;
            border: none; border-radius: var(--radius-lg);
            background: var(--md-surface-4); color: var(--md-on-surface);
            font-size: 15px; font-family: inherit;
            outline: none !important;
            box-shadow: none !important;
            transition: background 0.25s, box-shadow 0.25s;
            -webkit-appearance: none;
        }
        .search-bar input::placeholder { color: var(--md-on-surface-variant); }
        .search-bar input:focus {
            background: var(--md-surface-5);
            box-shadow: 0 2px 12px var(--md-shadow) !important;
        }
        .search-bar .s-icon {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: var(--md-on-surface-variant); font-size: 22px;
            pointer-events: none;
        }
        .search-bar .s-btn {
            position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
            background: var(--md-primary); color: var(--md-on-primary);
            border: none; border-radius: 50%; width: 34px; height: 34px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.25s cubic-bezier(0.2,0,0,1);
        }
        .search-bar .s-btn:hover { opacity: 0.85; transform: translateY(-50%) scale(1.1); }
        .search-bar .s-btn:active { transform: translateY(-50%) scale(0.9); }

        .search-suggestions {
            position: absolute; left: 0; right: 0; top: calc(100% + 8px);
            background: color-mix(in srgb, var(--md-surface-2) 94%, transparent);
            border: 1px solid var(--md-outline-variant);
            border-radius: 22px;
            box-shadow: 0 12px 28px var(--md-shadow);
            backdrop-filter: blur(18px);
            max-height: 320px;
            overflow-y: auto;
            z-index: 80;
            opacity: 0;
            transform: translateY(8px) scale(0.985);
            pointer-events: none;
            transition: opacity 0.22s ease, transform 0.22s ease;
        }
        .search-suggestions.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }
        .search-suggestions::-webkit-scrollbar { width: 6px; }
        .search-suggestions::-webkit-scrollbar-thumb {
            background: var(--md-outline-variant);
            border-radius: 999px;
        }
        .search-suggestion {
            width: 100%;
            border: none;
            background: transparent;
            color: var(--md-on-surface);
            font-family: inherit;
            text-align: left;
            padding: 12px 14px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }
        .search-suggestion:hover,
        .search-suggestion.active {
            background: var(--md-surface-3);
        }
        .search-suggestion:active { transform: scale(0.99); }
        .search-suggestion .material-symbols-rounded {
            font-size: 20px;
            color: var(--md-primary);
            margin-top: 1px;
            flex-shrink: 0;
        }
        .search-suggestion-main {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.25;
        }
        .search-suggestion-meta {
            font-size: 12px;
            color: var(--md-on-surface-variant);
            line-height: 1.35;
            margin-top: 2px;
        }
        .search-empty {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--md-on-surface-variant);
            font-size: 13px;
            font-weight: 600;
        }

        .icon-btn {
            background: none; border: none; color: var(--md-on-surface-variant);
            cursor: pointer; border-radius: 50%; width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s cubic-bezier(0.2,0,0,1); flex-shrink: 0;
            position: relative; overflow: hidden;
        }
        .icon-btn::after {
            content: ''; position: absolute; inset: 0;
            background: var(--md-ripple); border-radius: 50%;
            opacity: 0; transform: scale(0);
            transition: all 0.4s cubic-bezier(0.2,0,0,1);
        }
        .icon-btn:hover::after { opacity: 1; transform: scale(1); }
        .icon-btn:active { transform: scale(0.85); }
        .icon-btn:active::after { opacity: 1; transform: scale(1); background: var(--md-primary-container); }

        .theme-indicator {
            display: flex; align-items: center; gap: 4px;
            font-size: 10px; font-weight: 600; color: var(--md-on-surface-variant);
            background: var(--md-surface-3); padding: 4px 10px; border-radius: var(--radius-lg);
            white-space: nowrap; transition: all 0.3s;
        }
        .theme-indicator .material-symbols-rounded { font-size: 16px; color: var(--md-primary); }

        .main { max-width: 1100px; margin: 0 auto; padding: 16px; }

        /* ===== CARDS ===== */
        .card {
            background: var(--md-surface-1); border-radius: var(--radius-md);
            padding: 20px; margin-bottom: 14px;
            border: 1px solid var(--md-outline-variant);
            transition: all 0.3s cubic-bezier(0.2,0,0,1);
        }
        .card:hover {
            box-shadow: 0 4px 20px var(--md-shadow);
            transform: translateY(-1px);
        }

        /* ===== HERO ===== */
        .hero {
            background: linear-gradient(135deg, var(--md-primary-container) 0%, var(--md-tertiary-container) 100%);
            border-radius: var(--radius-xl); padding: 28px 28px 24px;
            margin-bottom: 14px; position: relative; overflow: hidden; border: none;
            transition: all 0.3s cubic-bezier(0.2,0,0,1);
        }
        .hero:hover { box-shadow: 0 8px 32px var(--md-shadow); }
        .hero::before {
            content: ''; position: absolute; top: -80px; right: -80px;
            width: 240px; height: 240px;
            background: radial-gradient(circle, var(--md-primary) 0%, transparent 70%); opacity: 0.1;
        }
        .hero-label {
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--md-on-primary-container); opacity: 0.6; margin-bottom: 2px;
        }
        .hero-city {
            font-size: 26px; font-weight: 800; color: var(--md-on-primary-container);
            margin-bottom: 16px; letter-spacing: -0.5px; position: relative; z-index: 1;
        }
        .hero-main {
            display: flex; align-items: center; gap: 20px; flex-wrap: wrap; position: relative; z-index: 1;
        }
        .hero-visual {
            width: 140px; height: 140px;
            border-radius: 50%;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.45), rgba(255,255,255,0.08) 42%, rgba(255,255,255,0.02) 70%);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.22);
            backdrop-filter: blur(8px);
        }
        .hero-visual::before {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.16), rgba(255,255,255,0.02) 70%);
            pointer-events: none;
        }
        .hero-temp {
            font-size: 76px; font-weight: 300; line-height: 1;
            color: var(--md-on-primary-container); letter-spacing: -4px;
        }
        .hero-wicon {
            font-size: 72px; color: var(--md-on-primary-container); opacity: 0.85;
        }
        .hero-details { display: flex; flex-direction: column; gap: 3px; }
        .hero-desc { font-size: 18px; font-weight: 600; color: var(--md-on-primary-container); text-transform: capitalize; }
        .hero-sub { font-size: 13px; color: var(--md-on-primary-container); opacity: 0.65; font-weight: 500; }

        /* ===== STATS ===== */
        .stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px; margin-bottom: 14px;
        }
        .stat {
            background: var(--md-surface-2); border-radius: var(--radius-md); padding: 16px;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            border: 1px solid var(--md-outline-variant);
            transition: all 0.3s cubic-bezier(0.2,0,0,1);
            cursor: default;
        }
        .stat:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 6px 20px var(--md-shadow);
            border-color: var(--md-primary);
        }
        .stat-ic {
            width: 42px; height: 42px; border-radius: 50%;
            background: var(--md-primary-container); color: var(--md-on-primary-container);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .stat:hover .stat-ic { transform: scale(1.15) rotate(5deg); }
        .stat-v { font-size: 22px; font-weight: 800; transition: color 0.3s; }
        .stat-l { font-size: 11px; color: var(--md-on-surface-variant); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; text-align: center; }

        .stitle {
            font-size: 16px; font-weight: 700; margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px;
        }
        .stitle .material-symbols-rounded { color: var(--md-primary); font-size: 22px; }

        /* ===== HOURLY SCROLL ===== */
        .h-scroll {
            display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px;
            scrollbar-width: thin; scrollbar-color: var(--md-outline-variant) transparent;
            scroll-behavior: smooth;
        }
        .h-scroll::-webkit-scrollbar { height: 4px; }
        .h-scroll::-webkit-scrollbar-thumb { background: var(--md-outline-variant); border-radius: 4px; }
        .h-item {
            min-width: 68px; background: var(--md-surface-2); border-radius: var(--radius-md);
            padding: 10px 6px; display: flex; flex-direction: column; align-items: center;
            gap: 5px; border: 1px solid var(--md-outline-variant);
            transition: all 0.3s cubic-bezier(0.2,0,0,1); flex-shrink: 0;
            cursor: default;
        }
        .h-item:hover {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 4px 14px var(--md-shadow);
            border-color: var(--md-primary);
        }
        .h-item.now {
            background: var(--md-primary-container); border-color: var(--md-primary);
            box-shadow: 0 2px 12px var(--md-shadow);
        }
        .h-time { font-size: 11px; font-weight: 600; color: var(--md-on-surface-variant); }
        .h-ic { font-size: 26px; color: var(--md-primary); transition: transform 0.3s; }
        .h-item:hover .h-ic { transform: scale(1.2); }
        .h-temp { font-size: 15px; font-weight: 800; }
        .h-rain { font-size: 10px; color: var(--md-tertiary); font-weight: 600; }

        /* ===== DAILY LIST ===== */
        .d-list { display: flex; flex-direction: column; gap: 2px; }
        .d-item {
            display: grid; grid-template-columns: 90px 36px 1fr 56px;
            align-items: center; gap: 10px; padding: 10px 12px;
            border-radius: var(--radius-sm);
            transition: all 0.25s cubic-bezier(0.2,0,0,1);
            cursor: default;
        }
        .d-item:hover {
            background: var(--md-surface-variant);
            transform: translateX(4px);
        }
        .d-day { font-weight: 600; font-size: 14px; }
        .d-ic { font-size: 22px; color: var(--md-primary); transition: transform 0.3s; }
        .d-item:hover .d-ic { transform: scale(1.25) rotate(10deg); }
        .d-bar { height: 6px; border-radius: 3px; background: var(--md-surface-variant); position: relative; overflow: hidden; }
        .d-bar-fill {
            position: absolute; height: 100%; border-radius: 3px;
            background: linear-gradient(90deg, var(--md-primary), var(--md-tertiary));
            transition: width 1s cubic-bezier(0.2,0,0,1);
        }
        .d-temps { display: flex; gap: 6px; font-size: 13px; }
        .d-temps .hi { font-weight: 800; }
        .d-temps .lo { color: var(--md-on-surface-variant); font-weight: 500; }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        /* ===== SUN ARC ===== */
        .sun-wrap { display: flex; flex-direction: column; align-items: center; padding: 12px 0; }
        .sun-arc { width: 180px; height: 90px; position: relative; }
        .sun-arc-path {
            width: 180px; height: 90px;
            border: 3px dashed var(--md-outline-variant);
            border-bottom: 3px solid var(--md-outline-variant);
            border-radius: 90px 90px 0 0;
        }
        .sun-dot {
            position: absolute; width: 14px; height: 14px;
            background: #FFB300; border-radius: 50%;
            box-shadow: 0 0 16px rgba(255,179,0,0.6);
            transform: translate(-50%, -50%);
            animation: sunGlow 2s ease-in-out infinite;
        }
        @keyframes sunGlow {
            0%, 100% { box-shadow: 0 0 16px rgba(255,179,0,0.6); }
            50% { box-shadow: 0 0 28px rgba(255,179,0,0.9), 0 0 6px rgba(255,179,0,1); }
        }
        .sun-times { display: flex; justify-content: space-between; width: 180px; margin-top: 10px; }
        .sun-tl { font-size: 11px; color: var(--md-on-surface-variant); text-align: center; line-height: 1.4; }
        .sun-tv { font-size: 14px; font-weight: 700; display: block; }

        /* ===== AQI ===== */
        .aqi-bar {
            height: 8px; border-radius: 4px; position: relative; margin: 14px 0 8px;
            background: linear-gradient(90deg, #43a047, #8bc34a, #ffeb3b, #ff9800, #f44336, #9c27b0, #4a0072);
        }
        .aqi-mk {
            position: absolute; top: -5px; width: 18px; height: 18px;
            background: var(--md-on-surface); border: 3px solid var(--md-surface-1);
            border-radius: 50%; transform: translateX(-50%);
            box-shadow: 0 1px 4px var(--md-shadow);
            transition: left 1s cubic-bezier(0.2,0,0,1);
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex; gap: 4px; margin-bottom: 12px;
            background: var(--md-surface-2); padding: 4px; border-radius: var(--radius-lg);
            overflow-x: auto;
        }
        .tab {
            flex: 1; padding: 8px 14px; border: none; border-radius: var(--radius-lg);
            background: transparent; color: var(--md-on-surface-variant);
            font-size: 13px; font-weight: 600; font-family: inherit;
            cursor: pointer; white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.2,0,0,1);
            position: relative; overflow: hidden;
        }
        .tab::after {
            content: ''; position: absolute; inset: 0;
            background: var(--md-ripple); border-radius: var(--radius-lg);
            opacity: 0; transition: opacity 0.3s;
        }
        .tab:active::after { opacity: 1; }
        .tab.active {
            background: var(--md-primary); color: var(--md-on-primary);
            box-shadow: 0 2px 8px var(--md-shadow);
        }
        .tab:hover:not(.active) { background: var(--md-surface-variant); }
        .tab:active:not(.active) { transform: scale(0.95); }

        /* ===== MAP ===== */
        .map-wrap {
            border-radius: var(--radius-sm); overflow: hidden;
            height: 420px; position: relative;
            border: 1px solid var(--md-outline-variant);
        }
        .map-wrap .leaflet-container { height: 100%; width: 100%; border-radius: var(--radius-sm); }
        .map-layer-label {
            position: absolute; bottom: 8px; left: 8px; z-index: 500;
            background: var(--md-surface-2); color: var(--md-on-surface);
            padding: 4px 12px; border-radius: var(--radius-xs); font-size: 11px;
            font-weight: 700; border: 1px solid var(--md-outline-variant);
            backdrop-filter: blur(8px);
            transition: all 0.3s;
        }

        /* ===== SERVICE BANNERS ===== */
        .info-banner {
            background: linear-gradient(135deg, var(--md-surface-2) 0%, var(--md-surface-3) 100%);
            border-radius: var(--radius-md); padding: 18px 20px; margin-bottom: 14px;
            display: flex; align-items: center; gap: 16px;
            position: relative; overflow: hidden;
            transition: all 0.35s cubic-bezier(0.2,0,0,1);
            border: 1px solid var(--md-outline-variant);
            color: var(--md-on-surface);
        }
        .info-banner:hover {
            box-shadow: 0 8px 24px var(--md-shadow);
            transform: translateY(-3px);
            border-color: var(--md-primary);
        }
        .info-banner::before {
            content: ''; position: absolute; top: -48px; right: -48px;
            width: 168px; height: 168px;

<script>
// ===== State =====
let LAT = 55.75, LON = 37.62;

// ===== Scroll Reveal (Intersection Observer) =====
function initRevealObserver() {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, {
        threshold: 0.08,
        rootMargin: '0px 0px -30px 0px'
    });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

// ===== Auto Theme =====
function applyAutoTheme(sunriseISO, sunsetISO) {
    const now = new Date();
    let isDark = false;
    let period = 'День';
    let icon = 'light_mode';

    if (sunriseISO && sunsetISO) {
        const sunrise = new Date(sunriseISO);
        const sunset = new Date(sunsetISO);
        currentSunrise = sunrise;
        currentSunset = sunset;
        const nowMs = now.getTime();
        const dawnStart = sunrise.getTime() - 30 * 60000;
        const duskEnd = sunset.getTime() + 30 * 60000;

        if (nowMs < dawnStart) {
            isDark = true; period = 'Ночь'; icon = 'dark_mode';
        } else if (nowMs < sunrise.getTime()) {
            isDark = false; period = 'Рассвет'; icon = 'wb_twilight';
        } else if (nowMs < sunrise.getTime() + 2 * 3600000) {
            isDark = false; period = 'Утро'; icon = 'wb_sunny';
        } else if (nowMs < sunset.getTime() - 2 * 3600000) {
            isDark = false; period = 'День'; icon = 'light_mode';
        } else if (nowMs < sunset.getTime()) {
            isDark = false; period = 'Вечер'; icon = 'wb_twilight';
        } else if (nowMs < duskEnd) {
            isDark = true; period = 'Сумерки'; icon = 'nightlight';
        } else {
            isDark = true; period = 'Ночь'; icon = 'dark_mode';
        }
    } else {
        const h = now.getHours();
        if (h >= 6 && h < 10) { period = 'Утро'; icon = 'wb_sunny'; }
        else if (h >= 10 && h < 17) { period = 'День'; icon = 'light_mode'; }
        else if (h >= 17 && h < 21) { period = 'Вечер'; icon = 'wb_twilight'; isDark = false; }
        else { isDark = true; period = 'Ночь'; icon = 'dark_mode'; }
    }

    if (isDark) document.body.classList.add('dark');
    else document.body.classList.remove('dark');

    document.getElementById('themeIcon').textContent = icon;
    document.getElementById('themeText').textContent = period;
}
applyAutoTheme(null, null);

// ===== WMO =====
const WMO = {
    0: { d: 'Ясно', i: 'clear_day', n: 'clear_night' },

    85: { d: 'Снегопад', i: 'weather_snowy', n: 'weather_snowy' },

};
function getWMO(code, isDay) {
    const w = WMO[code] || { d: 'Неизвестно', i: 'cloud', n: 'cloud' };
    return { desc: w.d, icon: isDay ? w.i : w.n };
}

// ===== Service banners =====
function getInfoBanner(type, data = {}) {

}

function buildWeatherTip(cur, daily) {
    const rainToday = daily?.precipitation_probability_max?.[0] ?? 0;
    if (rainToday >= 60) return {
        tip: 'Высока вероятность осадков — лучше взять зонт или дождевик.',
        meta: `Вероятность осадков до ${rainToday}%`
    };
    if ((cur.wind_speed_10m ?? 0) >= 10) return {
        tip: 'На улице ветрено — пригодится плотная куртка или верхний слой.',
        meta: `Порывы до ${Math.round(cur.wind_gusts_10m ?? cur.wind_speed_10m)} м/с`
    };
    if ((cur.temperature_2m ?? 0) <= 0) return {
        tip: 'На улице холодно — одевайтесь теплее и не забывайте про перчатки.',
        meta: 'Температура около нуля или ниже'
    };
    if ((daily?.uv_index_max?.[0] ?? 0) >= 6) return {
        tip: 'Солнце активное — очки и SPF сегодня точно не будут лишними.',
        meta: `UV индекс до ${daily.uv_index_max[0]}`
    };
    return {
        tip: 'Погода комфортная — отличный день для прогулки без лишней экипировки.',
        meta: 'Условия в пределах комфортного диапазона'
    };
}

// ===== Hidden multi-model weather consensus =====
const WEATHER_CONSENSUS_MODELS = [
    'best_match',
    'icon_seamless',
    'gfs_seamless',
    'meteofrance_seamless',
    'jma_seamless',
    'gem_seamless'
];
const WEATHER_QUERY_PARTS = {
    current: 'temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,weather_code,cloud_cover,pressure_msl,surface_pressure,wind_speed_10m,wind_direction_10m,wind_gusts_10m',
    hourly: 'temperature_2m,weather_code,precipitation_probability,precipitation,is_day,wind_speed_10m',
    daily: 'weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,uv_index_max'
};
function numOrNull(v) {
    const n = Number(v);
    return Number.isFinite(n) ? n : null;
}
function avgValues(values, fallback = 0) {
    const nums = values.map(numOrNull).filter(v => v !== null);
    return nums.length ? nums.reduce((a, b) => a + b, 0) / nums.length : fallback;
}
function modeValue(values, fallback = null) {
    const items = values.filter(v => v !== undefined && v !== null && v !== '');
    if (!items.length) return fallback;
    const counts = new Map();
    let best = items[0];
    let bestCount = 0;
    for (const value of items) {
        const key = typeof value === 'string' ? value : JSON.stringify(value);
        const next = (counts.get(key)?.count || 0) + 1;
        counts.set(key, { count: next, value });
        if (next > bestCount) {
            bestCount = next;
            best = value;
        }
    }
    return best;
}
function avgAngle(values, fallback = 0) {
    const nums = values.map(numOrNull).filter(v => v !== null);
    if (!nums.length) return fallback;
    const x = nums.reduce((sum, v) => sum + Math.cos(v * Math.PI / 180), 0) / nums.length;
    const y = nums.reduce((sum, v) => sum + Math.sin(v * Math.PI / 180), 0) / nums.length;
    let deg = Math.atan2(y, x) * 180 / Math.PI;
    if (deg < 0) deg += 360;
    return deg;
}
function avgIsoDate(values, fallback = '') {
    const times = values.map(v => new Date(v).getTime()).filter(Number.isFinite);
    if (!times.length) return fallback;
    return new Date(Math.round(times.reduce((a, b) => a + b, 0) / times.length)).toISOString();
}
function getBaseForecast(models) {
    return models.find(m => m?.current && m?.hourly && m?.daily) || models[0] || null;
}
function aggregateSeries(models, section, field, strategy = 'avg') {
    const base = getBaseForecast(models);
    const baseArray = base?.[section]?.[field];
    if (!Array.isArray(baseArray)) return [];
    return baseArray.map((fallbackValue, index) => {
        const values = models
            .map(model => model?.[section]?.[field]?.[index])
            .filter(v => v !== undefined && v !== null);
        if (!values.length) return fallbackValue;
        if (strategy === 'mode') return modeValue(values, fallbackValue);
        if (strategy === 'iso') return avgIsoDate(values, fallbackValue);
        return avgValues(values, numOrNull(fallbackValue) ?? 0);
    });
}
function buildForecastUrl(model = '') {
    return `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`
        + `&current=${WEATHER_QUERY_PARTS.current}`
        + `&hourly=${WEATHER_QUERY_PARTS.hourly}`
        + `&daily=${WEATHER_QUERY_PARTS.daily}`
        + `&timezone=auto&forecast_days=7`
        + (model ? `&models=${encodeURIComponent(model)}` : '');
}
async function fetchForecastModel(model) {
    const res = await fetch(buildForecastUrl(model));
    if (!res.ok) throw new Error(`Weather model failed: ${model || 'default'}`);
    const data = await res.json();
    data._model = model || 'default';
    return data;
}
function buildConsensusForecast(models) {
    const base = getBaseForecast(models);
    if (!base) throw new Error('No forecast data available');
    return {
        current: {
            temperature_2m: avgValues(models.map(m => m?.current?.temperature_2m), base.current.temperature_2m),
            relative_humidity_2m: avgValues(models.map(m => m?.current?.relative_humidity_2m), base.current.relative_humidity_2m),
            apparent_temperature: avgValues(models.map(m => m?.current?.apparent_temperature), base.current.apparent_temperature),
            is_day: modeValue(models.map(m => m?.current?.is_day), base.current.is_day),
            precipitation: avgValues(models.map(m => m?.current?.precipitation), base.current.precipitation),
            weather_code: modeValue(models.map(m => m?.current?.weather_code), base.current.weather_code),
            cloud_cover: avgValues(models.map(m => m?.current?.cloud_cover), base.current.cloud_cover),
            pressure_msl: avgValues(models.map(m => m?.current?.pressure_msl), base.current.pressure_msl),
            surface_pressure: avgValues(models.map(m => m?.current?.surface_pressure), base.current.surface_pressure),
            wind_speed_10m: avgValues(models.map(m => m?.current?.wind_speed_10m), base.current.wind_speed_10m),
            wind_direction_10m: avgAngle(models.map(m => m?.current?.wind_direction_10m), base.current.wind_direction_10m),
            wind_gusts_10m: avgValues(models.map(m => m?.current?.wind_gusts_10m), base.current.wind_gusts_10m)
        },
        hourly: {
            time: base.hourly?.time || [],
            temperature_2m: aggregateSeries(models, 'hourly', 'temperature_2m'),
            weather_code: aggregateSeries(models, 'hourly', 'weather_code', 'mode'),
            precipitation_probability: aggregateSeries(models, 'hourly', 'precipitation_probability'),
            precipitation: aggregateSeries(models, 'hourly', 'precipitation'),
            is_day: aggregateSeries(models, 'hourly', 'is_day', 'mode'),
            wind_speed_10m: aggregateSeries(models, 'hourly', 'wind_speed_10m')
        },
        daily: {
            time: base.daily?.time || [],
            weather_code: aggregateSeries(models, 'daily', 'weather_code', 'mode'),
            temperature_2m_max: aggregateSeries(models, 'daily', 'temperature_2m_max'),
            temperature_2m_min: aggregateSeries(models, 'daily', 'temperature_2m_min'),
            sunrise: aggregateSeries(models, 'daily', 'sunrise', 'iso'),
            sunset: aggregateSeries(models, 'daily', 'sunset', 'iso'),
            precipitation_sum: aggregateSeries(models, 'daily', 'precipitation_sum'),
            precipitation_probability_max: aggregateSeries(models, 'daily', 'precipitation_probability_max'),
            wind_speed_10m_max: aggregateSeries(models, 'daily', 'wind_speed_10m_max'),
            uv_index_max: aggregateSeries(models, 'daily', 'uv_index_max')
        },
        _consensus: {
            sourceCount: models.length,
            sourceNames: models.map(m => m._model)
        }
    };
}
async function fetchConsensusForecast() {
    const settled = await Promise.allSettled(WEATHER_CONSENSUS_MODELS.map(model => fetchForecastModel(model)));
    const successful = settled
        .filter(item => item.status === 'fulfilled')
        .map(item => item.value);

    if (!successful.length) {
        const fallback = await fetchForecastModel('');
        return buildConsensusForecast([fallback]);
    }

    return buildConsensusForecast(successful);
}

// ===== Utils =====
function snack(msg) {
    const s = document.getElementById('snackbar');
    s.textContent = msg; s.classList.add('show');
    clearTimeout(s._t); s._t = setTimeout(() => s.classList.remove('show'), 3500);
}
function navTo(id, btn) {
    if (id === 'top') window.scrollTo({ top: 0, behavior: 'smooth' });
    else document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.querySelectorAll('.bnav-i').forEach(n => n.classList.remove('active'));
    btn?.classList.add('active');
}
function windDir(deg) {
    return ['С','СВ','В','ЮВ','Ю','ЮЗ','З','СЗ'][Math.round(deg / 45) % 8];
}
function fmtTime(iso) { return iso ? iso.slice(11, 16) : '--:--'; }
function escapeHtml(str) {
    return String(str ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
}
function buildLocationLabel(address = {}) {
    const district = address.city_district || address.suburb || address.borough || address.neighbourhood || address.quarter || '';
    const city = address.city || address.town || address.village || address.municipality || address.county || address.state || '';
    const country = address.country || '';
    const parts = [district, city, country].filter(Boolean);
    return parts.length ? parts.join(', ') : '';
}
async function fetchNominatimSuggestions(query) {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&accept-language=ru&addressdetails=1&limit=8&q=${encodeURIComponent(query)}`, {
        signal: searchSuggestAbort.signal,
        headers: { 'Accept': 'application/json' }
    });
    const d = await r.json();
    return (d || []).map(item => ({
        name: item.name || item.address?.city_district || item.address?.suburb || item.address?.city || item.display_name?.split(',')[0] || 'Локация',
        admin1: item.address?.city || item.address?.town || item.address?.village || item.address?.county || '',
        admin2: item.address?.state || '',
        country: item.address?.country || '',
        latitude: Number(item.lat),
        longitude: Number(item.lon),
        display_name: item.display_name || '',
        source: 'nominatim'
    })).filter(item => Number.isFinite(item.latitude) && Number.isFinite(item.longitude));
}
function formatSuggestionLabel(item) {
    const main = item.display_name
        ? item.display_name.split(',').slice(0, 2).join(', ').trim()
        : [item.name, item.admin1].filter(Boolean).join(', ');
    const meta = item.display_name
        ? item.display_name.split(',').slice(2).join(' · ').trim()
        : [item.country, item.admin2].filter(Boolean).join(' · ');
    return { main, meta };
}
function renderSuggestions(items = []) {
    const box = document.getElementById('searchSuggestions');
    if (!box) return;
    citySuggestions = items;
    activeSuggestionIndex = -1;
    if (!items.length) {
        box.classList.remove('show');
        box.innerHTML = '';
        return;
    }
    box.innerHTML = items.map((item, index) => {
        const label = formatSuggestionLabel(item);
        return `<button class="search-suggestion ripple-host" type="button" onclick="pickSuggestion(${index})">
            <span class="material-symbols-rounded">location_city</span>
            <div>
                <div class="search-suggestion-main">${escapeHtml(label.main || item.name || 'Город')}</div>
                <div class="search-suggestion-meta">${escapeHtml(label.meta || `${item.latitude.toFixed(2)}, ${item.longitude.toFixed(2)}`)}</div>
            </div>
        </button>`;
    }).join('');
    box.classList.add('show');
}
function hideSuggestions() {
    const box = document.getElementById('searchSuggestions');
    if (!box) return;
    box.classList.remove('show');
}
function setActiveSuggestion(index) {
    const items = document.querySelectorAll('.search-suggestion');
    items.forEach((el, i) => el.classList.toggle('active', i === index));
    activeSuggestionIndex = index;
}
function pickSuggestion(index) {
    const item = citySuggestions[index];
    if (!item) return;
    const input = document.getElementById('searchInput');
    input.value = [item.name, item.country].filter(Boolean).join(', ');
    hideSuggestions();
    citySuggestions = [];
    activeSuggestionIndex = -1;
    LAT = item.latitude;
    LON = item.longitude;
    fetchWeather([item.name, item.country].filter(Boolean).join(', '));
}
async function fetchSuggestions(query) {
    if (searchSuggestAbort) searchSuggestAbort.abort();
    searchSuggestAbort = new AbortController();
    try {
        const [openMeteoItems, nominatimItems] = await Promise.allSettled([
            fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6&language=ru&format=json`, { signal: searchSuggestAbort.signal })
                .then(r => r.json())
                .then(d => d.results || []),
            fetchNominatimSuggestions(query)
        ]);

        const merged = [];
        const seen = new Set();
        const pushUnique = (item) => {
            const key = `${(item.name || '').toLowerCase()}|${item.latitude?.toFixed?.(3)}|${item.longitude?.toFixed?.(3)}`;
            if (seen.has(key)) return;
            seen.add(key);
            merged.push(item);
        };

        if (openMeteoItems.status === 'fulfilled') openMeteoItems.value.forEach(pushUnique);
        if (nominatimItems.status === 'fulfilled') nominatimItems.value.forEach(pushUnique);

        renderSuggestions(merged.slice(0, 8));
    } catch (e) {
        if (e.name !== 'AbortError') renderSuggestions([]);
    }
}

// ===== Search =====
const searchInputEl = document.getElementById('searchInput');
searchInputEl.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown' && citySuggestions.length) {
        e.preventDefault();
        setActiveSuggestion(Math.min(activeSuggestionIndex + 1, citySuggestions.length - 1));
        return;
    }
    if (e.key === 'ArrowUp' && citySuggestions.length) {
        e.preventDefault();
        setActiveSuggestion(Math.max(activeSuggestionIndex - 1, 0));
        return;
    }
    if (e.key === 'Enter') {
        e.preventDefault();
        if (activeSuggestionIndex >= 0 && citySuggestions[activeSuggestionIndex]) pickSuggestion(activeSuggestionIndex);
        else doSearch();
    }
    if (e.key === 'Escape') hideSuggestions();
});
searchInputEl.addEventListener('input', e => {
    const q = e.target.value.trim();
    clearTimeout(searchSuggestTimer);
    if (q.length < 2) {
        renderSuggestions([]);
        return;
    }
    searchSuggestTimer = setTimeout(() => fetchSuggestions(q), 180);
});
searchInputEl.addEventListener('focus', e => {
    const q = e.target.value.trim();
    if (q.length >= 2 && citySuggestions.length) {
        document.getElementById('searchSuggestions')?.classList.add('show');
    }
});
document.addEventListener('click', e => {
    const bar = document.querySelector('.search-bar');
    if (!bar?.contains(e.target)) hideSuggestions();
});

function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    hideSuggestions();
    if (activeSuggestionIndex >= 0 && citySuggestions[activeSuggestionIndex]) {
        pickSuggestion(activeSuggestionIndex);
        return;
    }
    fetchCity(q);
}

// ===== Geolocation: IP first, then GPS =====
async function initLocation() {
    showLoading('Определяем местоположение...');
    let gotIP = false;
    try {
        const ipApis = [
            'https://ipapi.co/json/',
            'https://ip-api.com/json/?lang=ru',
            'https://ipwho.is/'
        ];
        for (const apiUrl of ipApis) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                const r = await fetch(apiUrl, { signal: controller.signal });
                clearTimeout(timeoutId);
                const d = await r.json();
                if (d.latitude && d.longitude) {
                    LAT = d.latitude; LON = d.longitude;
                    gotIP = true;
                    const cityName = d.city || d.region || '';
                    const country = d.country_name || d.country || '';
                    snack(`📍 Определено по IP: ${cityName}`);
                    fetchWeather(cityName + (country ? ', ' + country : ''));
                    break;
                }
            } catch(e) {}
        }
    } catch(e) {}

    if (gotIP) { tryGPS(true); }
    else { tryGPS(false); }
}

function tryGPS(silent) {
    if (!navigator.geolocation) {
        if (!silent) { snack('Геолокация недоступна — Москва'); fetchCity('Москва'); }
        return;
    }
    navigator.geolocation.getCurrentPosition(
        p => { LAT = p.coords.latitude; LON = p.coords.longitude; if (silent) snack('📍 Уточнено по GPS'); fetchWeather(); },
        err => { if (!silent) { snack('Геолокация недоступна — Москва'); fetchCity('Москва'); } },
        { timeout: 8000, enableHighAccuracy: false }
    );
}

function geoLocate() {
    showLoading('Определяем местоположение...');
    if (!navigator.geolocation) { initLocation(); return; }
    snack('📍 Определяем местоположение...');
    navigator.geolocation.getCurrentPosition(
        p => { LAT = p.coords.latitude; LON = p.coords.longitude; fetchWeather(); },
        () => { initLocation(); },
        { timeout: 8000, enableHighAccuracy: true }
    );
}

async function fetchCity(name) {
    showLoading('Ищем место...');
    try {
        let chosen = null;

        const nominatimRes = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&accept-language=ru&addressdetails=1&limit=1&q=${encodeURIComponent(name)}`);
        const nominatimData = await nominatimRes.json();
        if (Array.isArray(nominatimData) && nominatimData.length) {
            const item = nominatimData[0];
            chosen = {
                latitude: Number(item.lat),
                longitude: Number(item.lon),
                label: buildLocationLabel(item.address) || item.display_name || name
            };
        }

        if (!chosen) {
            const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=ru&format=json`);
            const d = await r.json();
            if (!d.results || d.results.length === 0) { snack('Место не найдено'); return; }
            chosen = {
                latitude: d.results[0].latitude,
                longitude: d.results[0].longitude,
                label: [d.results[0].name, d.results[0].country].filter(Boolean).join(', ')
            };
        }

        LAT = chosen.latitude;
        LON = chosen.longitude;
        document.getElementById('searchInput').value = chosen.label;
        hideSuggestions();
        citySuggestions = [];
        activeSuggestionIndex = -1;
        fetchWeather(chosen.label);
    } catch (e) { snack('Ошибка поиска'); console.error(e); }
}

async function fetchWeather(cityName) {
    showLoading('Загрузка погоды...');
    try {
        let city = cityName;
        if (!city) {
            try {
                const rgr = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${LAT}&lon=${LON}&format=jsonv2&addressdetails=1&accept-language=ru`);
                const rgd = await rgr.json();
                city = buildLocationLabel(rgd.address) || rgd.display_name || `${LAT.toFixed(2)}°, ${LON.toFixed(2)}°`;
            } catch(e) {
                city = `${LAT.toFixed(2)}°, ${LON.toFixed(2)}°`;
            }
        }

        const data = await fetchConsensusForecast();

        if (data.daily?.sunrise?.[0] && data.daily?.sunset?.[0]) {
            applyAutoTheme(data.daily.sunrise[0], data.daily.sunset[0]);
        }

        render(data, city);
    } catch (e) {
        snack('Ошибка загрузки данных');
        console.error(e);
        document.getElementById('app').innerHTML = `
            <div class="loading">
                <span class="material-symbols-rounded" style="font-size:48px;color:var(--md-error)">cloud_off</span>
                <div class="loading-txt">Не удалось загрузить погоду</div>
                <button class="retry-btn" onclick="fetchWeather()">Попробовать снова</button>
            </div>`;
    }
}

function showLoading(msg) {
    document.getElementById('app').innerHTML =
        `<div class="loading"><div class="spinner"></div><div class="loading-txt">${msg || 'Загрузка...'}</div></div>`;
}

            <button class="tab" data-layer="wind" onclick="switchLayer('wind',this)">💨 Ветер</button>
            <button class="tab" data-layer="pressure" onclick="switchLayer('pressure',this)">🔵 Давление</button>
        </div>
        <div class="map-wrap">
            <iframe id="weatherMapFrame" class="map-embed" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Карта погоды"></iframe>
            <div class="map-layer-label" id="mapLabel">🌧️ Осадки</div>
        </div>
        <div class="map-note" id="mapNote">Показан актуальный слой карты для выбранного региона. Если слой недоступен у внешнего сервиса, автоматически откроется точка на карте местности.</div>
    </div>

    ${getInfoBanner('map')}`;

    document.getElementById('app').innerHTML = html;
    currentLayerType = 'rain';

    // Initialize scroll-reveal observer
    requestAnimationFrame(() => {
        initRevealObserver();
        setTimeout(initMap, 120);
    });
}

// ===== Map =====
function getMapUrl(type) {
    const lat = Number(LAT).toFixed(4);
    const lon = Number(LON).toFixed(4);
    const bbox = `${(LON - 0.28).toFixed(4)}%2C${(LAT - 0.18).toFixed(4)}%2C${(LON + 0.28).toFixed(4)}%2C${(LAT + 0.18).toFixed(4)}`;
    const base = `https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${lat}%2C${lon}`;
    const windyOverlays = {
        rain: 'rain',
        clouds: 'clouds',
        temp: 'temp',
        wind: 'wind',
        pressure: 'pressure'
    };
    if (windyOverlays[type]) {
        return `https://embed.windy.com/embed2.html?lat=${lat}&lon=${lon}&zoom=7&level=surface&overlay=${windyOverlays[type]}&product=ecmwf&menu=&message=&marker=true&calendar=now&pressure=true&type=map&location=coordinates&detail=true&detailLat=${lat}&detailLon=${lon}&metricWind=m%2Fs&metricTemp=%C2%B0C`;
    }
    return base;
}

function initMap() {
    const frame = document.getElementById('weatherMapFrame');
    if (!frame) return;
    frame.src = getMapUrl(currentLayerType);
}

function switchLayer(type, btn) {
    currentLayerType = type;
    const labels = { rain: '🌧️ Осадки', clouds: '☁️ Облака', temp: '🌡️ Температура', wind: '💨 Ветер', pressure: '🔵 Давление' };
    const notes = {
        rain: 'Слой осадков показывает зоны дождя и снега вокруг выбранной точки.',
        clouds: 'Слой облачности помогает оценить плотность облаков и просветы.',
        temp: 'Температурный слой показывает распределение температуры по региону.',
        wind: 'Слой ветра позволяет быстро увидеть направление и силу потоков.',
        pressure: 'Слой давления полезен для оценки циклонов и антициклонов.'
    };
    const labelEl = document.getElementById('mapLabel');
    if (labelEl) labelEl.textContent = labels[type] || '';
    const noteEl = document.getElementById('mapNote');
    if (noteEl) noteEl.textContent = notes[type] || '';
    document.querySelectorAll('#mapTabs .tab').forEach(t => t.classList.remove('active'));
    btn?.classList.add('active');
    const frame = document.getElementById('weatherMapFrame');
    if (frame) frame.src = getMapUrl(type);
}

// ===== Auto theme timer =====
setInterval(() => {
    if (currentSunrise && currentSunset) {
        applyAutoTheme(currentSunrise.toISOString(), currentSunset.toISOString());
    }
}, 5 * 60 * 1000);

// ===== Init =====
initLocation();
</script>
